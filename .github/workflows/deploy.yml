name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: workers/requirements.txt

      - name: Install dependencies
        run: pip install -r workers/requirements.txt
        working-directory: workers

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        working-directory: workers

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy - Backend
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger Render Deploy - VTON
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_VTON }}

      - name: Trigger Render Deploy - Scrapers
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_SCRAPERS }}

      - name: Trigger Render Deploy - Frontend
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
