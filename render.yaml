services:
  # Backend API
  - type: web
    name: ft-lineone-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    healthCheckPath: /health
    envVars:
      - fromGroup: ft-lineone-common
      - key: DATABASE_URL
        fromDatabase:
          name: ft-lineone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ft-lineone-redis
          type: redis
          property: connectionString
      - key: SERVICE_TYPE
        value: web

  # Celery Worker (processes scraping tasks)
  - type: worker
    name: ft-lineone-celery-worker
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    envVars:
      - fromGroup: ft-lineone-common
      - key: DATABASE_URL
        fromDatabase:
          name: ft-lineone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ft-lineone-redis
          type: redis
          property: connectionString
      - key: SERVICE_TYPE
        value: celery-worker

  # Celery Beat (scheduler - triggers every 6h)
  - type: worker
    name: ft-lineone-celery-beat
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    envVars:
      - fromGroup: ft-lineone-common
      - key: DATABASE_URL
        fromDatabase:
          name: ft-lineone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ft-lineone-redis
          type: redis
          property: connectionString
      - key: SERVICE_TYPE
        value: celery-beat

  # Scrapers
  - type: web
    name: ft-lineone-scrapers
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scrapers
    envVars:
      - fromGroup: ft-lineone-common

  # VTON (proxy to Replicate)
  - type: web
    name: ft-lineone-vton
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8002
    envVars:
      - fromGroup: ft-lineone-common

  # Frontend (Static Site)
  - type: static
    name: ft-lineone-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://ft-lineone-backend.onrender.com/api/v1

databases:
  - name: ft-lineone-db
    region: ohio
    plan: free
    databaseType: postgres
    ipAllowList: []

redis:
  - name: ft-lineone-redis
    region: ohio
    plan: free
    maxmemoryPolicy: allkeys-lru

envVarGroups:
  - name: ft-lineone-common
    envVars:
      - key: JWT_SECRET
        value: ft-lineone-jwt-secret-2024-prod
      - key: JWT_ALGORITHM
        value: HS256
      - key: R2_ACCOUNT_ID
        value: b17c769bfd01fc782de6bf33b946ee82
      - key: R2_ACCESS_KEY_ID
        value: 9563f2285a1294a0f5a852eded01651f
      - key: R2_SECRET_ACCESS_KEY
        value: d50292f27291248a9c375336a003f335d84e99ee9562e40f27f14cdce8616698
      - key: R2_BUCKET
